server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Chuyển tiếp các yêu cầu /api nội bộ sang container backend
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React Router là SPA: mọi đường dẫn không tồn tại đều trả về index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache file tĩnh (js, css, ảnh) lâu hơn
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|woff2?|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}

